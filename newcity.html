<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ראש העין החדשה - פסגות אפק | כולל הרש"ש</title>
  <meta name="description" content="מפת ראש העין החדשה - שכונות פסגות אפק A-E, עם דגש על שכונה E. בורר שכונות ומפת גוגל.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Frank+Ruhl+Libre:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .hood-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 18px; }
    .hood-bar button { padding: 10px 20px; border-radius: 999px; border: 1px solid #cdddf3; background: #fff; color: var(--techelet-deep); font-family: inherit; font-weight: 700; cursor: pointer; transition: all .2s; }
    .hood-bar button.on { background: var(--grad-tech); color: #fff; border-color: transparent; box-shadow: 0 6px 16px rgba(31,99,184,.3); }
    .hood-bar button.emph { border-color: var(--gold); color: var(--gold-deep); }
    .hood-bar button.emph::after { content: " ★"; color: var(--gold); }
    .hood-bar button.emph.on { background: var(--grad-gold); color: #fff; border-color: transparent; }
    .hood-bar button.emph.on::after { color: #fff; }
    .new-map-wrap { max-width: 1040px; margin: 0 auto; }
    .new-map { width: 100%; height: 64vh; min-height: 400px; border: 0; border-radius: var(--radius); box-shadow: var(--shadow); display: block; }
    .hood-note { text-align: center; margin-top: 16px; color: var(--ink-soft); max-width: 760px; margin-inline: auto; }
    .hood-note b { color: var(--gold-deep); }
  </style>
</head>
<body>
  <div id="app-header"></div>

  <section class="page-head">
    <div class="container">
      <h1>🏙️ ראש העין החדשה</h1>
      <p>פסגות אפק · שכונות A–E · עם דגש על שכונה E</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-title">
        <h2 class="gold-text">מפת השכונות החדשות</h2>
        <p>בחרו שכונה כדי למקד את המפה</p>
      </div>

      <div class="hood-bar" id="hoodBar">
        <button data-q="פסגות אפק ראש העין" class="on" onclick="setHood(this)">כל פסגות אפק</button>
        <button data-q="פסגות אפק A ראש העין" onclick="setHood(this)">שכונה A</button>
        <button data-q="פסגות אפק B ראש העין" onclick="setHood(this)">שכונה B</button>
        <button data-q="פסגות אפק C ראש העין" onclick="setHood(this)">שכונה C</button>
        <button data-q="פסגות אפק D ראש העין" onclick="setHood(this)">שכונה D</button>
        <button data-q="פסגות אפק שכונה E ראש העין" class="emph" onclick="setHood(this)">שכונה E</button>
      </div>

      <div class="new-map-wrap">
        <iframe class="new-map" id="newMap" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=%D7%A4%D7%A1%D7%92%D7%95%D7%AA%20%D7%90%D7%A4%D7%A7%20%D7%A8%D7%90%D7%A9%20%D7%94%D7%A2%D7%99%D7%9F&output=embed"
          title="מפת ראש העין החדשה - פסגות אפק"></iframe>
      </div>

      <p class="hood-note">
        ⭐ <b>שכונה E</b> היא השכונה החדשה ביותר בפסגות אפק (ראש העין החדשה).
        למדריך בתי הכנסת בכל העיר — <a href="judaism.html" style="color:var(--techelet)">בתי כנסת ומקוואות</a>.
      </p>
    </div>
  </section>

  <div id="app-footer"></div>

  <script src="components.js"></script>
  <script src="script.js"></script>
  <script>
    function embedFor(q) { return 'https://www.google.com/maps?q=' + encodeURIComponent(q) + '&output=embed'; }
    function setHood(btn) {
      document.querySelectorAll('#hoodBar button').forEach(function (b) { b.classList.remove('on'); });
      btn.classList.add('on');
      document.getElementById('newMap').src = embedFor(btn.getAttribute('data-q'));
    }
  </script>
</body>
</html>
