<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>סיפורי הרש"ש הקדוש | כולל הרש"ש ראש העין</title>
  <meta name="description" content="אוסף סיפורים ומסורות על הרש&quot;ש הקדוש - רבי שלום שרעבי זצ&quot;ל. קורא סיפורים בדפדפן עם חיפוש וניווט חלק.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Frank+Ruhl+Libre:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .tools { max-width: 900px; margin: 0 auto 22px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: center; }
    .tools .search { flex: 1; min-width: 220px; max-width: 460px; position: relative; }
    .tools .search input { width: 100%; padding: 12px 42px 12px 16px; border-radius: 12px; border: 1px solid var(--line); font-family: inherit; font-size: 1rem; color: var(--ink); background: #fff; box-shadow: var(--shadow-sm); }
    .tools .search::before { content: "🔍"; position: absolute; top: 50%; right: 14px; transform: translateY(-50%); opacity: .6; }
    .count-line { text-align: center; color: var(--muted); font-size: .9rem; margin-bottom: 22px; }

    .stories { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 18px; max-width: 1080px; margin: 0 auto; }
    .story-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 22px; cursor: pointer; transition: transform .22s, box-shadow .22s, border-color .22s; display: flex; flex-direction: column; gap: 8px; }
    .story-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); border-color: #dbe6f5; }
    .story-card .num { width: 38px; height: 38px; border-radius: 50%; background: var(--grad-gold); color: #fff; display: grid; place-items: center; font-family: 'Frank Ruhl Libre', serif; font-weight: 700; font-size: 1.05rem; box-shadow: 0 4px 12px rgba(198,160,46,.35); }
    .story-card h3 { color: var(--ink); font-size: 1.18rem; line-height: 1.4; }
    .story-card .tag { align-self: flex-start; font-size: .72rem; font-weight: 700; letter-spacing: 1px; color: var(--techelet); background: var(--techelet-soft); padding: 3px 10px; border-radius: 999px; }
    .story-card .peek { color: var(--ink-soft); font-size: .92rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .no-results { grid-column: 1/-1; text-align: center; padding: 40px; color: var(--muted); }

    /* קורא הסיפור (מודאל) */
    .reader-overlay { position: fixed; inset: 0; background: rgba(10,18,38,.55); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
    .reader-overlay.open { display: flex; }
    .reader-modal { background: var(--bg); border-radius: 22px; max-width: 720px; width: 100%; max-height: 88vh; overflow-y: auto; box-shadow: 0 30px 80px rgba(0,0,0,.4); position: relative; }
    .reader-modal .rm-head { position: sticky; top: 0; background: var(--grad-tech); color: #fff; padding: 26px 30px; border-radius: 22px 22px 0 0; }
    .reader-modal .rm-head .rm-num { font-size: .82rem; letter-spacing: 2px; color: #ffe9a8; }
    .reader-modal .rm-head h2 { font-size: 1.6rem; margin-top: 4px; line-height: 1.35; }
    .reader-modal .rm-close { position: absolute; top: 18px; left: 18px; background: rgba(255,255,255,.18); border: 0; color: #fff; width: 38px; height: 38px; border-radius: 50%; font-size: 1.3rem; cursor: pointer; line-height: 1; }
    .reader-modal .rm-close:hover { background: rgba(255,255,255,.32); }
    .reader-modal .rm-body { padding: 28px 30px; font-family: 'Frank Ruhl Libre', serif; font-size: 1.22rem; line-height: 2; color: var(--ink); text-align: justify; }
    .reader-modal .rm-body p { margin-bottom: 16px; }
    .reader-modal .rm-source { font-family: 'Heebo', sans-serif; font-size: .85rem; color: var(--muted); border-top: 1px solid var(--line); padding-top: 14px; margin-top: 10px; }
    .reader-modal .rm-nav { display: flex; justify-content: space-between; gap: 10px; padding: 0 30px 28px; }
    .reader-modal .rm-nav button { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #cdddf3; background: #fff; color: var(--techelet-deep); font-family: inherit; font-weight: 700; cursor: pointer; transition: background .2s; }
    .reader-modal .rm-nav button:hover:not(:disabled) { background: var(--techelet-soft); }
    .reader-modal .rm-nav button:disabled { opacity: .4; cursor: default; }

    @media (max-width: 600px) {
      .reader-modal .rm-head h2 { font-size: 1.3rem; }
      .reader-modal .rm-body { font-size: 1.12rem; padding: 22px; }
    }
  </style>
</head>
<body>
  <div id="app-header"></div>

  <section class="page-head">
    <div class="container">
      <h1>📜 סיפורי הרש"ש הקדוש</h1>
      <p>רבי שלום מזרחי שרעבי זצ"ל · מסורות וסיפורים</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="tools">
        <div class="search"><input type="text" id="searchBox" placeholder="חיפוש בסיפורים…" oninput="renderStories()"></div>
      </div>
      <div class="count-line" id="countLine"></div>
      <div class="stories" id="storiesGrid"></div>

      <p style="text-align:center; color:var(--muted); font-size:.86rem; margin-top:30px; max-width:720px; margin-inline:auto;">
        הסיפורים מובאים מן המסורת המקובלת על הרש"ש הקדוש ועל ישיבת המקובלים "בית אל".
        להעמקה ולמקורות — <a href="library.html" style="color:var(--techelet)">הספרייה התורנית</a> ועמוד
        <a href="rashash.html" style="color:var(--techelet)">הרש"ש הקדוש</a>.
        יש לכם סיפור או מקור נוסף? <a href="about.html" style="color:var(--techelet)">צרו קשר</a> ונשמח להוסיף.
      </p>
    </div>
  </section>

  <!-- קורא הסיפור -->
  <div class="reader-overlay" id="readerOverlay" onclick="if(event.target===this)closeReader()">
    <div class="reader-modal">
      <div class="rm-head">
        <button class="rm-close" onclick="closeReader()" aria-label="סגור">✕</button>
        <div class="rm-num" id="rmNum"></div>
        <h2 id="rmTitle"></h2>
      </div>
      <div class="rm-body" id="rmBody"></div>
      <div class="rm-nav">
        <button id="rmPrev" onclick="navStory(-1)">▶ הקודם</button>
        <button id="rmNext" onclick="navStory(1)">הבא ◀</button>
      </div>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="components.js"></script>
  <script src="script.js"></script>
  <script src="sippurim-data.js"></script>
  <script>
    var current = -1;

    function filtered() {
      var q = (document.getElementById('searchBox').value || '').trim();
      if (!q) return STORIES.map(function (s, i) { return i; });
      return STORIES.map(function (s, i) { return i; }).filter(function (i) {
        var s = STORIES[i];
        return s.title.indexOf(q) > -1 || s.body.indexOf(q) > -1 || (s.tag && s.tag.indexOf(q) > -1);
      });
    }

    function renderStories() {
      var idxs = filtered();
      document.getElementById('countLine').textContent = 'מציג ' + idxs.length + ' מתוך ' + STORIES.length + ' סיפורים';
      var grid = document.getElementById('storiesGrid');
      if (!idxs.length) { grid.innerHTML = '<div class="no-results">לא נמצאו סיפורים התואמים לחיפוש.</div>'; return; }
      grid.innerHTML = idxs.map(function (i) {
        var s = STORIES[i];
        var peek = s.body.replace(/<[^>]*>/g, '').slice(0, 110);
        return '<div class="story-card" onclick="openReader(' + i + ')">' +
          '<div class="num">' + (i + 1) + '</div>' +
          (s.tag ? '<span class="tag">' + s.tag + '</span>' : '') +
          '<h3>' + s.title + '</h3>' +
          '<div class="peek">' + peek + '…</div>' +
        '</div>';
      }).join('');
    }

    function openReader(i) {
      current = i;
      var s = STORIES[i];
      document.getElementById('rmNum').textContent = 'סיפור ' + (i + 1) + ' מתוך ' + STORIES.length + (s.tag ? ' · ' + s.tag : '');
      document.getElementById('rmTitle').textContent = s.title;
      var paras = s.body.split('\n').filter(Boolean).map(function (p) { return '<p>' + p + '</p>'; }).join('');
      document.getElementById('rmBody').innerHTML = paras +
        (s.source ? '<div class="rm-source">' + s.source + '</div>' : '');
      document.getElementById('rmPrev').disabled = (i === 0);
      document.getElementById('rmNext').disabled = (i === STORIES.length - 1);
      document.getElementById('readerOverlay').classList.add('open');
      document.querySelector('.reader-modal').scrollTop = 0;
      document.body.style.overflow = 'hidden';
    }

    function navStory(delta) {
      var n = current + delta;
      if (n >= 0 && n < STORIES.length) openReader(n);
    }

    function closeReader() {
      document.getElementById('readerOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function (e) {
      if (!document.getElementById('readerOverlay').classList.contains('open')) return;
      if (e.key === 'Escape') closeReader();
      if (e.key === 'ArrowRight') navStory(-1); // RTL: ימין = הקודם
      if (e.key === 'ArrowLeft') navStory(1);
    });

    renderStories();
  </script>
</body>
</html>
